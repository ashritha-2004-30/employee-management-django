
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'employee_app/css/style.css' %}">
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
</head>
<body>
    <h2>Task Management System</h2>

    <a href="{% url 'add_task' %}" class="add-btn">+ Add Task</a>

    <table>
<tr>
    <th>Title</th>
    <th>Description</th>
    <th>Date</th>
    <th>Status</th>
    <th>Actions</th>
</tr>

{% for task in tasks %}
<tr>
    <td>{{ task.title }}</td>
    <td>{{ task.description }}</td>

    <td>{{ task.created_at|date:"d M Y" }}</td>

    <td>
        {% if task.status %}
            ✔ Completed
        {% else %}
            ⏳ Pending
        {% endif %}
    </td>
<td>
    <a href="{% url 'update_task' task.id %}" class="btn edit">Edit</a>
    <a href="{% url 'complete_task' task.id %}" class="btn complete">Complete</a>
    <a href="/delete/{{ task.id }}" 
       class="btn delete"
       onclick="return confirm('Are you sure you want to delete this task?');">
       Delete
    </a>
</td>
</tr>
{% endfor %}
</table>

          
</body>
</html>
